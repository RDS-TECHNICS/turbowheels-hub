<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Forgot password — Soul Art Studio</title>
<style>
 body{font-family:Arial;margin:0;background:#f4f6f9}
 .wrap{max-width:420px;margin:40px auto;padding:20px;background:#fff;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,0.06)}
 input{width:100%;padding:10px;margin:8px 0;border-radius:6px;border:1px solid #ddd}
 .btn{background:#1e90ff;color:#fff;padding:10px;border-radius:6px;border:0;width:100%;font-weight:700;cursor:pointer}
 .muted{font-size:13px;color:#666}
 .loading{display:none;text-align:center;color:#1e90ff;margin:10px 0}
 .error{color:red;font-size:14px;margin-top:10px;text-align:center}
 .success{color:green;font-size:14px;margin-top:10px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <h2>Forgot password</h2>
  <input id="email" type="email" placeholder="Enter your registered email" />
  <button class="btn" id="sendOtpBtn">Send OTP via Email</button>
  <div class="loading" id="loading">📧 Sending OTP to your email...</div>
  <div id="msg"></div>
</div>

<script>
const API_BASE = 'http://localhost:5000/api';

document.getElementById('sendOtpBtn').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const msg = document.getElementById('msg');
  const loading = document.getElementById('loading');
  const btn = document.getElementById('sendOtpBtn');
  
  // Clear previous messages
  msg.className = '';
  msg.textContent = '';
  
  if(!email){ 
      msg.className = 'error';
      msg.textContent = 'Please enter your email'; 
      return; 
  }

  // Basic email validation
  if (!email.includes('@') || !email.includes('.')) {
      msg.className = 'error';
      msg.textContent = 'Please enter a valid email address';
      return;
  }

  try {
      loading.style.display = 'block';
      btn.disabled = true;
      btn.textContent = 'Sending...';

      console.log('🔄 Sending OTP request for:', email);

      const response = await fetch(`${API_BASE}/forgot-password`, {
        method: 'POST',
        headers: { 
            'Content-Type': 'application/json',
            'Accept': 'application/json'
        },
        body: JSON.stringify({ email })
      });

      console.log('📡 Response status:', response.status);

      // Check if response is JSON
      const contentType = response.headers.get('content-type');
      if (!contentType || !contentType.includes('application/json')) {
          throw new Error('Server returned non-JSON response');
      }

      const data = await response.json();
      console.log('📦 Response data:', data);

      if (!response.ok) {
          throw new Error(data.error || `HTTP error! status: ${response.status}`);
      }

      if (data.success) {
          localStorage.setItem('resetEmail', email);
          msg.className = 'success';
          msg.textContent = data.message + ' Redirecting to OTP page...';
          
          setTimeout(() => {
              window.location.href = 'otp.html';
          }, 1500);
      } else {
          msg.className = 'error';
          msg.textContent = data.error || 'Failed to send OTP. Please try again.';
      }
      
  } catch(error) {
      console.error('❌ Forgot password error:', error);
      msg.className = 'error';
      
      if (error.message.includes('Failed to fetch')) {
          msg.textContent = 'Network error. Please check if server is running.';
      } else if (error.message.includes('non-JSON')) {
          msg.textContent = 'Server error. Please try again.';
      } else {
          msg.textContent = error.message || 'Network error. Please try again.';
      }
  } finally {
      loading.style.display = 'none';
      btn.disabled = false;
      btn.textContent = 'Send OTP via Email';
  }
});

// Allow sending OTP on Enter key
document.getElementById('email').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        document.getElementById('sendOtpBtn').click();
    }
});
</script>
</body>
</html>
